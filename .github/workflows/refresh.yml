name: Refresh Starboard

on:
  schedule:
    - cron: "0 4 * * *"   # daily at 04:00 UTC
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch starred repositories
        env:
          GH_STARS_PAT: ${{ secrets.GH_STARS_PAT }}
        run: python scripts/fetch_stars.py

      - name: Enrich with GitHub Models
        env:
          GH_STARS_PAT: ${{ secrets.GH_STARS_PAT }}
          GH_MODELS_PAT: ${{ secrets.GH_MODELS_PAT }}
        run: python scripts/enrich_stars.py

      - name: Build site
        run: python scripts/build_site.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stars.json site/data/stars.json
          git diff --cached --quiet || git commit -m "chore: refresh stars data [skip ci]"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
